name: Evaluate Submission

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - 'submissions/**'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  evaluate-level2:
    if: contains(github.event.pull_request.title, 'level-2')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Find submission file
        id: find
        run: |
          git fetch origin master
          FILE=$(git diff --name-only origin/master...${{ github.event.pull_request.head.sha }} | grep "^submissions/.*level2" | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          if [ -z "$FILE" ]; then
            echo "No level2 submission found"
            exit 1
          fi

      - name: Evaluate Level 2
        id: eval
        run: |
          FILE="${{ steps.find.outputs.file }}"
          SCORE=0
          MAX=5
          FEEDBACK=""

          CONTENT=$(cat "$FILE")

          # Check 1: Contains test client output
          if echo "$CONTENT" | grep -q "PASS.*smile_overview"; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ Test client output present — LPI server ran successfully"
          else
            FEEDBACK="$FEEDBACK\n❌ Missing test client output — did you run \`npm run test-client\`?"
          fi

          # Check 2: Contains LLM output (any model)
          if echo "$CONTENT" | grep -qi "digital twin\|digital-twin\|methodology\|SMILE"; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ LLM output present"
          else
            FEEDBACK="$FEEDBACK\n❌ Missing LLM output or it doesn't mention digital twins"
          fi

          # Check 3: Model choice explained
          if echo "$CONTENT" | grep -qi "chose\|model\|RAM\|qwen\|llama\|gemma\|smollm\|mistral"; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ Model choice documented"
          else
            FEEDBACK="$FEEDBACK\n⚠️ Model choice not clearly explained"
          fi

          # Check 4: SMILE reflection (3 sentences minimum)
          REFLECTION_LINES=$(echo "$CONTENT" | grep -ci "surprise\|interest\|learn\|expect\|notice\|realize\|thought")
          if [ "$REFLECTION_LINES" -ge 1 ]; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ SMILE reflection present"
          else
            FEEDBACK="$FEEDBACK\n⚠️ SMILE reflection seems thin — what genuinely surprised you?"
          fi

          # Check 5: Shows all 7 tools passing
          PASS_COUNT=$(echo "$CONTENT" | grep -c "\[PASS\]" || true)
          if [ "$PASS_COUNT" -ge 7 ]; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ All 7 tools passing ($PASS_COUNT/7+)"
          else
            FEEDBACK="$FEEDBACK\n⚠️ Only $PASS_COUNT tool passes detected (expected 7+)"
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "max=$MAX" >> $GITHUB_OUTPUT
          # Write feedback to file to preserve newlines
          echo -e "$FEEDBACK" > /tmp/feedback.txt

      - name: Post evaluation
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const score = parseInt('${{ steps.eval.outputs.score }}');
            const max = parseInt('${{ steps.eval.outputs.max }}');
            const feedback = fs.readFileSync('/tmp/feedback.txt', 'utf8');
            const pct = Math.round((score / max) * 100);

            const stars = '⭐'.repeat(score) + '☆'.repeat(max - score);

            let verdict = '';
            if (score >= 4) verdict = '**Excellent work!** Ready for Level 3.';
            else if (score >= 3) verdict = '**Good submission.** Consider improving the areas marked ⚠️, then try Level 3.';
            else verdict = '**Needs improvement.** Please address the ❌ items and push again.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Automated Level 2 Evaluation\n\n**Score: ${score}/${max}** ${stars} (${pct}%)\n\n### Checklist\n${feedback}\n\n### Verdict\n${verdict}\n\n---\n*This evaluation was performed automatically. A human reviewer may follow up on outstanding submissions.*`
            });

      - name: Save score
        if: steps.eval.outputs.score != ''
        uses: actions/github-script@v7
        with:
          script: |
            const score = parseInt('${{ steps.eval.outputs.score }}') || 0;
            const max = parseInt('${{ steps.eval.outputs.max }}') || 5;
            const name = context.payload.pull_request.title.replace(/^level-2:\s*/i, '').trim();

            // Read existing scores
            let scores = {};
            try {
              const { data } = await github.rest.repos.getContent({ owner: context.repo.owner, repo: context.repo.repo, path: 'docs/scores.json' });
              scores = JSON.parse(Buffer.from(data.content, 'base64').toString());
              scores._sha = data.sha;
            } catch(e) { /* file doesn't exist yet */ }

            const sha = scores._sha;
            delete scores._sha;

            // Update score for this person
            const key = name.toLowerCase().replace(/\s+/g, '-');
            scores[key] = { name, level: 2, score, max, pct: Math.round((score/max)*100), updated: new Date().toISOString() };

            // Write back
            const content = Buffer.from(JSON.stringify(scores, null, 2)).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path: 'docs/scores.json', message: `score: ${name} L2 ${score}/${max} [automated]`,
              content, ...(sha ? { sha } : {})
            });

  evaluate-level3:
    if: contains(github.event.pull_request.title, 'level-3')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Find submission and extract repo URL
        id: find
        run: |
          git fetch origin master
          FILE=$(git diff --name-only origin/master...${{ github.event.pull_request.head.sha }} | grep "^submissions/.*level3" | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

          if [ -z "$FILE" ]; then
            echo "No level3 submission found"
            exit 1
          fi

          # Extract GitHub repo URL from the submission
          REPO_URL=$(grep -oP 'https://github\.com/[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+' "$FILE" | head -1)
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT

      - name: Evaluate Level 3 submission doc
        id: eval_doc
        run: |
          FILE="${{ steps.find.outputs.file }}"
          SCORE=0
          MAX=6
          FEEDBACK=""
          QUESTIONS=""
          CONTENT=$(cat "$FILE")

          # 1: Has a repo link (hard requirement)
          if [ -n "${{ steps.find.outputs.repo_url }}" ]; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ Agent repo linked: ${{ steps.find.outputs.repo_url }}"
          else
            FEEDBACK="$FEEDBACK\n❌ No GitHub repo URL found in submission"
            QUESTIONS="$QUESTIONS\n\n❓ Where is the code? A Level 3 submission without a repo is just a document."
          fi

          # 2: Word count — but quality matters more
          WORD_COUNT=$(echo "$CONTENT" | wc -w)
          if [ "$WORD_COUNT" -ge 100 ]; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ Detailed write-up ($WORD_COUNT words)"
          elif [ "$WORD_COUNT" -ge 30 ]; then
            FEEDBACK="$FEEDBACK\n⚠️ Write-up is thin ($WORD_COUNT words)"
            QUESTIONS="$QUESTIONS\n\n❓ If someone else submitted this exact write-up, what score would you give it? What's missing?"
          else
            FEEDBACK="$FEEDBACK\n❌ Write-up too short ($WORD_COUNT words)"
            QUESTIONS="$QUESTIONS\n\n❓ Can you explain your work to a teammate in 30 words? That's what this section is for."
          fi

          # 3: LPI tools — mentioning is NOT enough, check for actual usage evidence
          TOOL_MENTIONS=$(echo "$CONTENT" | grep -oic "smile_overview\|query_knowledge\|get_case_studies\|get_insights\|list_topics\|smile_phase_detail\|get_methodology_step" || true)
          HAS_ACTUAL_OUTPUT=$(echo "$CONTENT" | grep -ci "result\|response\|output\|returned\|json\|data.*from\|retrieved" || true)
          if [ "$TOOL_MENTIONS" -ge 2 ] && [ "$HAS_ACTUAL_OUTPUT" -ge 2 ]; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ LPI tools referenced with evidence of actual output"
          elif [ "$TOOL_MENTIONS" -ge 1 ]; then
            FEEDBACK="$FEEDBACK\n⚠️ LPI tools mentioned but no evidence they were actually called"
            QUESTIONS="$QUESTIONS\n\n❓ You mention the tools — but did your code actually call them? Paste a real response from the LPI. If you can't, that's a red flag."
          else
            FEEDBACK="$FEEDBACK\n❌ No LPI tools referenced"
            QUESTIONS="$QUESTIONS\n\n❓ The challenge requires querying at least 2 LPI tools. Which ones did you use, and what did they return?"
          fi

          # 4: Explainability — does the agent explain WHY, not just WHAT
          if echo "$CONTENT" | grep -qi "because\|reason\|explains\|traces\|cited.*source\|from tool\|the agent chose\|decision"; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ Explainability present — the agent shows its reasoning"
          else
            FEEDBACK="$FEEDBACK\n⚠️ No evidence of explainability"
            QUESTIONS="$QUESTIONS\n\n❓ If a user asks your agent 'why did you recommend this?' — what does it say? Show us. Explainability isn't a feature, it's a requirement."
          fi

          # 5: HOW_I_DID_IT exists and is genuine
          HOWFILE=""
          SUBDIR=$(dirname "$FILE")
          if [ -f "$SUBDIR/HOW_I_DID_IT.md" ]; then
            HOW_WORDS=$(cat "$SUBDIR/HOW_I_DID_IT.md" | wc -w)
            if [ "$HOW_WORDS" -ge 50 ]; then
              SCORE=$((SCORE + 1))
              FEEDBACK="$FEEDBACK\n✅ HOW_I_DID_IT.md present ($HOW_WORDS words)"
            else
              FEEDBACK="$FEEDBACK\n⚠️ HOW_I_DID_IT.md is too brief ($HOW_WORDS words)"
              QUESTIONS="$QUESTIONS\n\n❓ What was the hardest part? What did you try that didn't work? That's what we want to read — the struggle, not the summary."
            fi
          else
            FEEDBACK="$FEEDBACK\n❌ Missing HOW_I_DID_IT.md"
            QUESTIONS="$QUESTIONS\n\n❓ This file is required. We learn more about you from how you solved problems than from what you built."
          fi

          # 6: Original thinking — not just following instructions
          if echo "$CONTENT" | grep -qi "my approach\|I decided\|I tried.*but\|alternative\|trade.off\|chose.*because\|different from"; then
            SCORE=$((SCORE + 1))
            FEEDBACK="$FEEDBACK\n✅ Shows independent thinking and decision-making"
          else
            QUESTIONS="$QUESTIONS\n\n❓ What choices did you make that weren't in the instructions? What would you do differently next time? We're looking for people who think, not people who follow."
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "max=$MAX" >> $GITHUB_OUTPUT
          echo -e "$FEEDBACK" > /tmp/feedback.txt
          echo -e "$QUESTIONS" > /tmp/questions.txt

      - name: Clone and test agent repo
        id: clone_test
        if: steps.find.outputs.repo_url != ''
        continue-on-error: true
        run: |
          CLONE_FEEDBACK=""
          CLONE_SCORE=0
          CLONE_QUESTIONS=""

          # Try to clone
          git clone ${{ steps.find.outputs.repo_url }} /tmp/agent-repo 2>&1 || {
            echo "clone_score=0" >> $GITHUB_OUTPUT
            echo -e "❌ Could not clone repo\n\n❓ Is the repo public? We can't evaluate what we can't access." > /tmp/clone_feedback.txt
            exit 0
          }
          CLONE_SCORE=$((CLONE_SCORE + 1))
          CLONE_FEEDBACK="$CLONE_FEEDBACK\n✅ Repo cloned successfully"

          cd /tmp/agent-repo

          # Check for README
          if [ -f README.md ] || [ -f readme.md ]; then
            CLONE_SCORE=$((CLONE_SCORE + 1))
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n✅ README present"
          else
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n❌ No README found"
            CLONE_QUESTIONS="$CLONE_QUESTIONS\n\n❓ No README? If a teammate cloned this right now, could they figure out how to run it in 2 minutes? That's the bar."
          fi

          # Check for agent.json (A2A card)
          if [ -f agent.json ] || [ -f .well-known/agent.json ]; then
            CLONE_SCORE=$((CLONE_SCORE + 1))
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n⭐ A2A Agent Card found — you understand agent discovery (bonus point)"
          fi

          # CRITICAL: Does the code actually call LPI tools via MCP/subprocess/HTTP?
          REAL_CALLS=$(grep -rc "tools/call\|CallToolRequest\|subprocess.*index.js\|stdio.*transport\|StdioClientTransport\|mcp\|json_rpc\|jsonrpc" . --include="*.py" --include="*.js" --include="*.ts" 2>/dev/null | awk -F: '{s+=$2}END{print s+0}')
          PRINT_ONLY=$(grep -rc "print.*smile_overview\|print.*get_insights\|print.*Tools Used" . --include="*.py" --include="*.js" --include="*.ts" 2>/dev/null | awk -F: '{s+=$2}END{print s+0}')

          if [ "$REAL_CALLS" -ge 1 ]; then
            CLONE_SCORE=$((CLONE_SCORE + 2))
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n✅ Code makes real MCP/tool calls ($REAL_CALLS references found)"
          elif [ "$PRINT_ONLY" -ge 1 ]; then
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n🔴 Code mentions tool names in print statements but does NOT actually call them"
            CLONE_QUESTIONS="$CLONE_QUESTIONS\n\n❓ **Honest question:** does your agent actually connect to the LPI server and call tools? Or does it print hardcoded text that mentions tool names? There's a big difference. We checked the code — be honest with yourself here."
          else
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n❌ No evidence of LPI tool calls in code"
            CLONE_QUESTIONS="$CLONE_QUESTIONS\n\n❓ Your code doesn't appear to call any LPI tools. The requirement is clear: 'Query at least 2 LPI tools.' How does your agent get data from the LPI?"
          fi

          # Check for error handling
          ERROR_HANDLING=$(grep -rc "try:\|except\|catch\|\.catch\|if.*error\|raise\|throw" . --include="*.py" --include="*.js" --include="*.ts" 2>/dev/null | awk -F: '{s+=$2}END{print s+0}')
          if [ "$ERROR_HANDLING" -ge 3 ]; then
            CLONE_SCORE=$((CLONE_SCORE + 1))
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n✅ Error handling present ($ERROR_HANDLING instances)"
          elif [ "$ERROR_HANDLING" -ge 1 ]; then
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n⚠️ Minimal error handling ($ERROR_HANDLING instances)"
            CLONE_QUESTIONS="$CLONE_QUESTIONS\n\n❓ What happens if the LPI server is down? What if the user sends empty input? What if the LLM returns garbage? Try breaking your own agent and see what happens."
          else
            CLONE_FEEDBACK="$CLONE_FEEDBACK\n❌ No error handling detected"
            CLONE_QUESTIONS="$CLONE_QUESTIONS\n\n❓ Zero error handling. In a real system this crashes on first unexpected input. What would you tell a junior dev who submitted code like this?"
          fi

          # Code complexity — is this real engineering or a toy?
          TOTAL_LINES=$(find . -name "*.py" -o -name "*.js" -o -name "*.ts" | xargs cat 2>/dev/null | wc -l)
          if [ "$TOTAL_LINES" -lt 20 ]; then
            CLONE_QUESTIONS="$CLONE_QUESTIONS\n\n❓ Total code: $TOTAL_LINES lines. If someone else submitted this, what would your honest assessment be? Is this a working agent or a script that prints text?"
          fi

          echo "clone_score=$CLONE_SCORE" >> $GITHUB_OUTPUT
          echo -e "$CLONE_FEEDBACK" > /tmp/clone_feedback.txt
          echo -e "$CLONE_QUESTIONS" >> /tmp/clone_feedback.txt

      - name: Post Level 3 evaluation
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const docScore = parseInt('${{ steps.eval_doc.outputs.score }}') || 0;
            const docMax = parseInt('${{ steps.eval_doc.outputs.max }}') || 6;
            const cloneScore = parseInt('${{ steps.clone_test.outputs.clone_score }}') || 0;
            const totalScore = docScore + cloneScore;
            const totalMax = docMax + 7;

            const docFeedback = fs.readFileSync('/tmp/feedback.txt', 'utf8');
            const questions = fs.readFileSync('/tmp/questions.txt', 'utf8').trim();
            let cloneFeedback = '';
            try {
              cloneFeedback = fs.readFileSync('/tmp/clone_feedback.txt', 'utf8');
            } catch(e) {
              cloneFeedback = '⚠️ Could not evaluate repo (no URL found or clone failed)';
            }

            const pct = Math.round((totalScore / totalMax) * 100);
            const stars = '⭐'.repeat(Math.min(totalScore, 5)) + '☆'.repeat(Math.max(0, 5 - totalScore));

            let verdict = '';
            if (pct >= 80) verdict = '**Strong submission.** You clearly built something real. Nice work.';
            else if (pct >= 60) verdict = '**Solid foundation.** The core is there, but the questions below matter — answer them honestly and push an update.';
            else if (pct >= 40) verdict = '**Needs more work.** Read the questions below carefully. We\'re not trying to catch you out — we genuinely want to see you succeed. But we need to see real work, not surface-level output.';
            else verdict = '**Be honest with yourself.** Does this submission reflect your best effort? If someone else submitted this, what score would you give it? Rework it and push again — the deadline is Sunday.';

            const questionsSection = questions ? `\n\n### Questions for you\nPlease respond to these in a comment on this PR. We read every answer.\n${questions}` : '';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Level 3 Evaluation\n\n**Score: ${totalScore}/${totalMax}** ${stars} (${pct}%)\n\n### Submission Document\n${docFeedback}\n\n### Repo Analysis\n${cloneFeedback}${questionsSection}\n\n### Verdict\n${verdict}\n\n---\n*This is an automated evaluation. A human reviewer will follow up on all Level 3 submissions. Scores feed the [leaderboard](https://life-atlas.github.io/lpi-developer-kit/).*\n\n*Tip: The best way to improve your score is to answer the questions above honestly and push an updated submission.*`
            });

      - name: Save score
        if: steps.eval_doc.outputs.score != ''
        uses: actions/github-script@v7
        with:
          script: |
            const docScore = parseInt('${{ steps.eval_doc.outputs.score }}') || 0;
            const cloneScore = parseInt('${{ steps.clone_test.outputs.clone_score }}') || 0;
            const totalScore = docScore + cloneScore;
            const totalMax = 13;
            const name = context.payload.pull_request.title.replace(/^level-3:\s*/i, '').trim();

            let scores = {};
            try {
              const { data } = await github.rest.repos.getContent({ owner: context.repo.owner, repo: context.repo.repo, path: 'docs/scores.json' });
              scores = JSON.parse(Buffer.from(data.content, 'base64').toString());
              scores._sha = data.sha;
            } catch(e) {}

            const sha = scores._sha;
            delete scores._sha;

            const key = name.toLowerCase().replace(/\s+/g, '-');
            scores[key] = { name, level: 3, score: totalScore, max: totalMax, pct: Math.round((totalScore/totalMax)*100), updated: new Date().toISOString() };

            const content = Buffer.from(JSON.stringify(scores, null, 2)).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path: 'docs/scores.json', message: `score: ${name} L3 ${totalScore}/${totalMax} [automated]`,
              content, ...(sha ? { sha } : {})
            });
